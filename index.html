<head>

    if (typeof supabase === 'undefined') {
      document.write('<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"><\/script>');

  <!-- App CSS -->

      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            primary: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a8a' },
            dark: { 800:'#1e293b', 850:'#172032', 900:'#0f172a', 950:'#080d17' }
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans min-h-screen" style="background:#F8FAFC;color:#334155">

  <!-- App Root -->
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh">
      <div style="text-align:center">
        <div style="width:48px;height:48px;border:3px solid #2563EB;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
        <p style="color:#64748B;font-size:14px">Yuklanmoqda...</p>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px"></div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <!-- Core modules -->
  <script src="js/config.js?v=69"></script>
  <script src="js/supabase.js?v=97"></script>
  <script src="js/utils.js?v=67"></script>
  <script src="js/components.js?v=66"></script>

  <script src="js/router.js?v=62"></script>

  <script src="js/pages/login.js?v=62"></script>

  <script src="js/pages/bemor-karta.js?v=78"></script>
  <script src="js/pages/bemorlar.js?v=66"></script>
  <script src="js/pages/hisobot.js?v=86"></script>
  <script src="js/pages/admin.js?v=78"></script>
  <script src="js/pages/settings.js?v=61"></script>
  <script src="js/pages/harakat.js?v=3"></script>

  <!-- App init -->
  <script src="js/app.js?v=64"></script>

  <!-- Auto-reload: checks for new version every 5 minutes -->
  <script>
    (function() {
      const APP_BUILD = '20260613-01';
      const BUILD_KEY = 'rshtyoim_build';
      const stored = localStorage.getItem(BUILD_KEY);
      if (stored && stored !== APP_BUILD) {
        localStorage.setItem(BUILD_KEY, APP_BUILD);
        location.reload(true);
        return;
      }
      localStorage.setItem(BUILD_KEY, APP_BUILD);

      // Har 60 sekundda yangi versiya borligini tekshir
      setInterval(async () => {
        try {
          const r = await fetch('/index.html?_=' + Date.now(), { cache: 'no-store' });
          const txt = await r.text();
          const m = txt.match(/APP_BUILD\s*=\s*'([^']+)'/);
          if (m && m[1] !== APP_BUILD) {
            // Foydalanuvchiga katta bildirishnoma ko'rsat
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1d4ed8;color:white;text-align:center;padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
            div.innerHTML = '🔄 Tizim yangilandi! Sahifa 3 soniyada avtomatik yangilanadi... &nbsp;<button onclick="location.reload(true)" style="background:white;color:#1d4ed8;border:none;border-radius:8px;padding:6px 16px;font-weight:800;cursor:pointer;font-size:14px">Hozir yangilash</button>';
            document.body.prepend(div);
            setTimeout(() => location.reload(true), 3000);
          }
        } catch(e) {}
      }, 60 * 1000);
    })();
  </script>
</body>
</html>
